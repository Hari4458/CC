apiVersion: v1
kind: Secret
metadata:
  name: studycloud-secrets
type: Opaque
stringData:
  # DO NOT commit real secrets. Replace values locally before applying.
  SQL_SERVER:  YOUR_SQL_SERVER
  SQL_DATABASE: YOUR_SQL_DATABASE
  SQL_USER: YOUR_SQL_USER
  SQL_PASSWORD: YOUR_SQL_PASSWORD
  JWT_SECRET: YOUR_JWT_SECRET
  EMAIL_USER: YOUR_EMAIL_USER
  EMAIL_PASSWORD: YOUR_EMAIL_PASSWORD
  VERIFICATION_URL: YOUR_VERIFICATION_URL
  GEMINI_API_KEY: YOUR_GEMINI_API_KEY
  AZURE_STORAGE_CONNECTION_STRING: YOUR_AZURE_STORAGE_CONNECTION_STRING
  AZURE_LANGUAGE_KEY: YOUR_AZURE_LANGUAGE_KEY
  AZURE_LANGUAGE_ENDPOINT: YOUR_AZURE_LANGUAGE_ENDPOINT
