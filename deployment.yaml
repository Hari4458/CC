apiVersion: apps/v1
kind: Deployment
metadata:
  name: studycloud-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: studycloud
  template:
    metadata:
      labels:
        app: studycloud
    spec:
      containers:
      - name: studycloud-app
        image: studycloudacr4458.azurecr.io/study-cloud-app:v1
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: studycloud-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
