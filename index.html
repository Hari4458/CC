<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>StudyCloud</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

  <header class="navbar">
    <h1>StudyCloud</h1>
    <div style="display: flex; gap: 15px; align-items: center;">
      <span id="userDisplay" style="color: white; font-size: 14px;"></span>
      <button onclick="toggleTheme()" class="theme-btn">🌙</button>
      <button onclick="logout()"
        style="background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;">Logout</button>
    </div>
  </header>

  <main class="container">

    <section class="upload-box">
      <h2>Upload Study Material</h2>

      <input type="text" id="subject" placeholder="Subject (Folder)">
      <input type="text" id="filename" placeholder="File Name">

      <label class="file-upload">
        <input type="file" id="fileInput">
        <span>📎 Choose File</span>
      </label>

      <p id="fileName">No file selected</p>

      <button class="upload-btn" onclick="uploadFile()">Upload File</button>
    </section>

    <section class="notes-section">
      <h2>Your Notes</h2>
      <div id="folders"></div>
    </section>

    <!-- AI Assistant Section -->
    <section class="ai-assistant">
      <div class="ai-header">
        <h2>✨ AI Assistant</h2>
        <span class="ai-status" id="aiStatus">Ready to help</span>
      </div>
      <div class="ai-box">
        <div class="ai-tabs">
          <button class="ai-tab active" onclick="switchAiTab('chat')">💬 Chat</button>
          <button class="ai-tab" onclick="switchAiTab('summarize')">📝 Summarize</button>
          <button class="ai-tab" onclick="switchAiTab('quiz')">❓ Quiz</button>
        </div>
        
        <div id="aiChat" class="ai-content active">
          <div class="chat-messages" id="chatMessages">
            <div class="message ai">Hi! I'm here to help. Select a note to start chatting or ask me anything!</div>
          </div>
          <div class="chat-input-box">
            <input type="text" id="aiInput" placeholder="Ask a question about your notes...">
            <button onclick="sendAiChat()">Send</button>
          </div>
        </div>

        <div id="aiSummarize" class="ai-content">
          <div class="ai-action-box">
            <p>Select a note to generate a summary.</p>
            <button class="primary-btn" onclick="summarizeCurrentNote()">Generate Summary</button>
          </div>
          <div class="ai-result" id="summaryResult"></div>
        </div>

        <div id="aiQuiz" class="ai-content">
          <div class="ai-action-box">
            <p>Ready to test your knowledge?</p>
            <button class="primary-btn" onclick="generateQuiz()">Create 5 MCQs</button>
          </div>
          <div class="ai-result" id="quizResult"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- Floating Menu -->
  <div id="menu" class="menu"></div>

  <script src="script-azure.js"></script>
</body>

</html>
