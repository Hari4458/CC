<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 18px;
            color: #333;
        }

        .close-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .close-btn:hover {
            background: #ff5252;
        }

        .viewer-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            flex-wrap: wrap;
            gap: 16px;
        }

        #pdfViewer {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #pdfViewer canvas {
            border: 1px solid #e0e0e0;
            max-width: 100%;
            border-radius: 4px;
        }

        #imageViewer {
            max-width: 100%;
            max-height: 600px;
            border-radius: 6px;
        }

        #textViewer {
            width: 100%;
            height: 600px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            background: #fafafa;
        }

        .loading {
            text-align: center;
            color: #666;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }

        #docxViewer,
        #pptxViewer,
        #xlsxViewer {
            width: 100%;
            height: 600px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        #videoViewer {
            width: 100%;
            max-width: 900px;
            max-height: 600px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #000;
        }

        #audioViewer {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2 id="filename">File Viewer</h2>
        <button class="close-btn" onclick="window.close()">Close</button>
    </div>

    <div class="viewer-container">
        <div id="pdfViewer" style="display: none;"></div>
        <img id="imageViewer" style="display: none;" />
        <video id="videoViewer" style="display: none;" controls></video>
        <audio id="audioViewer" style="display: none;" controls></audio>
        <textarea id="textViewer" style="display: none;" readonly></textarea>
        <iframe id="docxViewer" style="display: none;"></iframe>
        <iframe id="pptxViewer" style="display: none;"></iframe>
        <iframe id="xlsxViewer" style="display: none;"></iframe>
        <div id="loadingMsg" style="display: none;" class="loading">
            <p>Loading file...</p>
        </div>
        <div id="errorMsg" style="display: none;" class="error"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const API_URL = window.location.origin + '/api';

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        const filename = decodeURIComponent(urlParams.get('filename') || 'File');

        document.getElementById('filename').textContent = filename;

        function downloadCurrentFile() {
            const a = document.createElement('a');
            a.href = `${API_URL}/files/${fileId}/download`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        if (!fileId) {
            showError('No file ID provided');
        } else {
            viewFile(fileId, filename);
        }

        function viewFile(currentFileId, currentFilename) {
            const parts = currentFilename.toLowerCase().split('.');
            const ext = parts.length > 1 ? parts[parts.length - 1] : '';

            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('loadingMsg').textContent = '⏳ Loading file...';

            fetch(`${API_URL}/files/${currentFileId}/view`)
                .then((response) => {
                    if (!response.ok) throw new Error('Failed to fetch file');
                    return response.blob();
                })
                .then((blob) => {
                    document.getElementById('loadingMsg').style.display = 'none';
                    detectAndDisplayFile(blob, ext, currentFilename);
                })
                .catch((error) => {
                    showError('Failed to view file: ' + error.message);
                });
        }

        function detectAndDisplayFile(blob, ext, currentFilename) {
            if (blob.type.includes('video')) {
                displayVideo(blob);
                return;
            }

            if (blob.type.includes('audio')) {
                displayAudio(blob);
                return;
            }

            if (['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'm4v', 'ogv', '3gp', 'ts', 'vob'].includes(ext)) {
                displayVideo(blob);
                return;
            }

            if (['mp3', 'wav', 'ogg', 'aac', 'flac', 'm4a', 'wma', 'aiff', 'ape'].includes(ext)) {
                displayAudio(blob);
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const arr = new Uint8Array(event.target.result).subarray(0, 8);
                let header = '';
                for (let i = 0; i < arr.length; i++) {
                    header += arr[i].toString(16);
                }

                if (blob.type.includes('pdf') || checkPDFHeader(event.target.result)) {
                    displayPDF(blob);
                } else if (blob.type.includes('image') || isImageHeader(header)) {
                    displayImage(blob);
                } else if (blob.type.includes('video') || isVideoHeader(header)) {
                    displayVideo(blob);
                } else if (blob.type.includes('audio') || isAudioHeader(header)) {
                    displayAudio(blob);
                } else {
                    displayFile(blob, ext, currentFilename);
                }
            };
            reader.readAsArrayBuffer(blob.slice(0, 8));
        }

        function isVideoHeader(header) {
            const normalized = header.toLowerCase();
            return normalized.includes('1a45dfa3') || normalized.includes('3026b275') || normalized.includes('66747970') || normalized.startsWith('464c56');
        }

        function isAudioHeader(header) {
            return header.startsWith('fff') || header.startsWith('ffe') || header.startsWith('52494646') || header.startsWith('4f6767') || header.startsWith('664c6143');
        }

        function checkPDFHeader(arrayBuffer) {
            const arr = new Uint8Array(arrayBuffer);
            return arr[0] === 0x25 && arr[1] === 0x50 && arr[2] === 0x44 && arr[3] === 0x46;
        }

        function isImageHeader(header) {
            const imageHeaders = ['ffd8', '89504e47', '474946', '424d'];
            return imageHeaders.some((value) => header.startsWith(value));
        }

        function displayFile(blob, ext) {
            if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(ext)) {
                displayImage(blob);
            } else if (ext === 'pdf') {
                displayPDF(blob);
            } else if (['txt', 'log', 'csv', 'json', 'xml', 'html', 'css', 'js', 'md', 'md5', 'sh', 'py', 'rb', 'java'].includes(ext)) {
                displayText(blob);
            } else if (['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'm4v', 'ogv', '3gp', 'ts', 'vob'].includes(ext)) {
                displayVideo(blob);
            } else if (['mp3', 'wav', 'ogg', 'aac', 'flac', 'm4a', 'wma', 'aiff', 'ape'].includes(ext)) {
                displayAudio(blob);
            } else if (ext === 'docx') {
                displayDocx(blob);
            } else if (ext === 'xlsx') {
                displayExcel(blob);
            } else if (ext === 'pptx') {
                displayPowerPoint(blob);
            } else {
                displayText(blob);
            }
        }

        function displayImage(blob) {
            const url = URL.createObjectURL(blob);
            const img = document.getElementById('imageViewer');
            img.src = url;
            img.style.display = 'block';
        }

        function displayVideo(blob) {
            const url = URL.createObjectURL(blob);
            const video = document.getElementById('videoViewer');
            video.src = url;
            video.style.display = 'block';
        }

        function displayAudio(blob) {
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioViewer');
            audio.src = url;
            audio.style.display = 'block';
        }

        function displayText(blob) {
            blob.text().then((text) => {
                const nonPrintable = (text.match(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g) || []).length;
                if (nonPrintable > text.length * 0.2) {
                    const errorMsg = document.getElementById('errorMsg');
                    errorMsg.innerHTML = `
                        <p>❌ This appears to be a binary file.</p>
                        <p>Try downloading it instead:</p>
                        <button onclick="downloadCurrentFile()" style="
                            background: #ff6b6b; color: white; border: none;
                            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
                            margin-top: 10px;
                        ">⬇️ Download File</button>
                    `;
                    errorMsg.style.display = 'block';
                    return;
                }

                const textarea = document.getElementById('textViewer');
                textarea.value = text;
                textarea.style.display = 'block';
            }).catch(() => {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.innerHTML = `
                    <p>❌ Could not read file as text.</p>
                    <p>Try downloading it instead:</p>
                    <button onclick="downloadCurrentFile()" style="
                        background: #ff6b6b; color: white; border: none;
                        padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
                        margin-top: 10px;
                    ">⬇️ Download File</button>
                `;
                errorMsg.style.display = 'block';
            });
        }

        function displayPDF(blob) {
            const url = URL.createObjectURL(blob);
            const pdfViewer = document.getElementById('pdfViewer');

            pdfjsLib.getDocument(url).promise.then((pdf) => {
                const renderPage = (pageNumber) => {
                    pdf.getPage(pageNumber).then((page) => {
                        const scale = 1.5;
                        const viewport = page.getViewport({ scale });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        page.render({
                            canvasContext: context,
                            viewport
                        }).promise.then(() => {
                            pdfViewer.appendChild(canvas);
                            if (pageNumber < pdf.numPages) {
                                renderPage(pageNumber + 1);
                            }
                        });
                    });
                };

                renderPage(1);
                pdfViewer.style.display = 'block';
            }).catch((error) => {
                showError('Failed to load PDF: ' + error.message);
            });
        }

        function displayDocx(blob) {
            const url = URL.createObjectURL(blob);
            const iframe = document.getElementById('docxViewer');
            iframe.src = `https://docs.google.com/gviz/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            iframe.style.display = 'block';
        }

        function displayExcel(blob) {
            const url = URL.createObjectURL(blob);
            const iframe = document.getElementById('xlsxViewer');
            iframe.src = `https://docs.google.com/gviz/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            iframe.style.display = 'block';
        }

        function displayPowerPoint(blob) {
            const url = URL.createObjectURL(blob);
            const iframe = document.getElementById('pptxViewer');
            iframe.src = `https://docs.google.com/gviz/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            iframe.style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loadingMsg').style.display = 'none';
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = `❌ ${message}`;
            errorMsg.style.display = 'block';
        }
    </script>
</body>

</html>
