<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>File Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 18px;
            color: #333;
        }

        .close-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .close-btn:hover {
            background: #ff5252;
        }

        .viewer-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        #pdfViewer {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #pdfViewer canvas {
            border: 1px solid #e0e0e0;
            max-width: 100%;
            border-radius: 4px;
        }

        #imageViewer {
            max-width: 100%;
            max-height: 600px;
            border-radius: 6px;
        }

        #textViewer {
            width: 100%;
            height: 600px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            background: #fafafa;
        }

        .loading {
            text-align: center;
            color: #666;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }

        #docxViewer,
        #pptxViewer,
        #xlsxViewer {
            width: 100%;
            height: 600px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        #videoViewer {
            width: 100%;
            max-width: 900px;
            max-height: 600px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #000;
        }

        #audioViewer {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2 id="filename">File Viewer</h2>
        <button class="close-btn" onclick="window.close()">Close</button>
    </div>

    <div class="viewer-container">
        <div id="pdfViewer" style="display: none;"></div>
        <img id="imageViewer" style="display: none;" />
        <video id="videoViewer" style="display: none;" controls></video>
        <audio id="audioViewer" style="display: none;" controls></audio>
        <textarea id="textViewer" style="display: none;" readonly></textarea>
        <iframe id="docxViewer" style="display: none;"></iframe>
        <iframe id="pptxViewer" style="display: none;"></iframe>
        <iframe id="xlsxViewer" style="display: none;"></iframe>
        <div id="loadingMsg" style="display: none;" class="loading">
            <p>Loading file...</p>
        </div>
        <div id="errorMsg" style="display: none;" class="error"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const API_URL = window.location.origin + '/api';

        // Get file ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        const filename = decodeURIComponent(urlParams.get('filename') || 'File');

        document.getElementById('filename').textContent = filename;

        function downloadCurrentFile() {
            const a = document.createElement('a');
            a.href = `${API_URL}/files/${fileId}/download`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        if (!fileId) {
            showError('No file ID provided');
        } else {
            viewFile(fileId, filename);
        }

        function viewFile(fileId, filename) {
            const parts = filename.toLowerCase().split('.');
            const ext = parts.length > 1 ? parts[parts.length - 1] : '';

            console.log('viewFile called - filename:', filename, 'ext:', ext);

            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('loadingMsg').textContent = '⏳ Loading file...';

            fetch(`${API_URL}/files/${fileId}/view`)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to fetch file');

                    console.log('Response content-type:', response.headers.get('content-type'));

                    return response.blob();
                })
                .then(blob => {
                    console.log('Got blob:', blob.type, 'size:', blob.size);
                    document.getElementById('loadingMsg').style.display = 'none';
                    // First try to detect type from content, then from extension
                    detectAndDisplayFile(blob, ext, filename);
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    showError('Failed to view file: ' + error.message);
                });
        }

        function detectAndDisplayFile(blob, ext, filename) {
            console.log('detectAndDisplayFile - ext:', ext, 'filename:', filename, 'blob type:', blob.type);

            // First, check blob.type if available (most reliable for media files)
            if (blob.type.includes('video')) {
                console.log('Detected video from blob type:', blob.type);
                displayVideo(blob, ext);
                return;
            }

            if (blob.type.includes('audio')) {
                console.log('Detected audio from blob type:', blob.type);
                displayAudio(blob, ext);
                return;
            }

            // Then check if extension indicates a known media type
            if (['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'm4v', 'ogv', '3gp', 'ts', 'vob'].includes(ext)) {
                console.log('Detected video format:', ext);
                displayVideo(blob, ext);
                return;
            }

            if (['mp3', 'wav', 'ogg', 'aac', 'flac', 'm4a', 'wma', 'aiff', 'ape'].includes(ext)) {
                console.log('Detected audio format:', ext);
                displayAudio(blob, ext);
                return;
            }

            // Read first few bytes to detect file type for ambiguous files
            const reader = new FileReader();
            reader.onload = (e) => {
                const arr = new Uint8Array(e.target.result).subarray(0, 8);
                let header = '';
                for (let i = 0; i < arr.length; i++) {
                    header += arr[i].toString(16);
                }

                console.log('File header:', header, 'blob type:', blob.type);

                // Detect PDF
                if (blob.type.includes('pdf') || checkPDFHeader(e.target.result)) {
                    console.log('Detected PDF');
                    displayPDF(blob);
                }
                // Detect images
                else if (blob.type.includes('image') || isImageHeader(header)) {
                    console.log('Detected image');
                    displayImage(blob);
                }
                // Detect video (MP4, WebM, etc. by common headers)
                else if (blob.type.includes('video') || isVideoHeader(header)) {
                    console.log('Detected video by header');
                    displayVideo(blob, ext);
                }
                // Detect audio
                else if (blob.type.includes('audio') || isAudioHeader(header)) {
                    console.log('Detected audio by header');
                    displayAudio(blob, ext);
                }
                // Default to display based on extension
                else {
                    console.log('No specific type detected, using displayFile');
                    displayFile(blob, ext, filename);
                }
            };
            reader.readAsArrayBuffer(blob.slice(0, 8));
        }

        function isVideoHeader(header) {
            const h = header.toLowerCase();

            // WebM: 1A 45 DF A3
            if (h.includes('1a45dfa3')) return true;

            // ASF/WMV: 30 26 B2 75
            if (h.includes('3026b275')) return true;

            // MP4: Has 'ftyp' or 'mdat' box typically at offset 4-7
            // ftyp in hex is 66747970
            if (h.includes('66747970') || h.includes('6d646174')) return true;

            // FLV: FLV signature starts with 0x46 0x4C 0x56
            if (h.startsWith('464c56')) return true;

            // Matroska (MKV): 1A 45 DF A3
            if (h.startsWith('1a45dfa3')) return true;

            return false;
        }

        function isAudioHeader(header) {
            // MP3: FFF prefix (or FFE for MPEG)
            // WAV: 52494646 (RIFF)
            // OGG: 4F6767 (OGG)
            // FLAC: 664C61 (fLa)
            if (header.startsWith('fff') || header.startsWith('ffe')) return true; // MP3
            if (header.startsWith('52494646')) return true; // WAV
            if (header.startsWith('4f6767')) return true; // OGG
            if (header.startsWith('664c6143')) return true; // FLAC
            return false;
        }

        function checkPDFHeader(arrayBuffer) {
            const arr = new Uint8Array(arrayBuffer);
            return arr[0] === 0x25 && arr[1] === 0x50 && arr[2] === 0x44 && arr[3] === 0x46; // %PDF
        }

        function isImageHeader(header) {
            // JPEG: FFD8
            // PNG: 89504E47
            // GIF: 474946
            // BMP: 424D
            const imageHeaders = ['ffd8', '89504e47', '474946', '424d'];
            return imageHeaders.some(h => header.startsWith(h));
        }

        function displayFile(blob, ext, filename) {
            if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(ext)) {
                displayImage(blob);
            } else if (ext === 'pdf') {
                displayPDF(blob);
            } else if (['txt', 'log', 'csv', 'json', 'xml', 'html', 'css', 'js', 'md', 'md5', 'sh', 'py', 'rb', 'java'].includes(ext)) {
                displayText(blob);
            } else if (['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'm4v', 'ogv', '3gp', 'ts', 'vob'].includes(ext)) {
                displayVideo(blob, ext);
            } else if (['mp3', 'wav', 'ogg', 'aac', 'flac', 'm4a', 'wma', 'aiff', 'ape'].includes(ext)) {
                displayAudio(blob, ext);
            } else if (ext === 'docx') {
                displayDocx(blob);
            } else if (ext === 'xlsx') {
                displayExcel(blob);
            } else if (ext === 'pptx') {
                displayPowerPoint(blob);
            } else {
                // For unknown types, try text - if it's binary, user gets download option
                displayText(blob);
            }
        }

        function displayImage(blob) {
            const url = URL.createObjectURL(blob);
            const img = document.getElementById('imageViewer');
            img.src = url;
            img.style.display = 'block';

            // Keep the blob URL alive for the image to display
            setTimeout(() => {
                // Don't revoke URL immediately - keep it for the image to use
            }, 5000);
        }

        function displayVideo(blob, ext) {
            const url = URL.createObjectURL(blob);
            const video = document.getElementById('videoViewer');
            video.src = url;
            video.style.display = 'block';
        }

        function displayAudio(blob, ext) {
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioViewer');
            audio.src = url;
            audio.style.display = 'block';
        }

        function displayText(blob) {
            blob.text().then(text => {
                // Check if the text looks like binary garbage (contains mostly non-printable characters)
                const nonPrintable = (text.match(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g) || []).length;
                if (nonPrintable > text.length * 0.2) {
                    // More than 20% non-printable characters = likely binary file
                    // Don't reject - just show error with download option
                    const errorMsg = document.getElementById('errorMsg');
                    errorMsg.innerHTML = `
                        <p>❌ This appears to be a binary file.</p>
                        <p>Try downloading it instead:</p>
                        <button onclick="downloadCurrentFile()" style="
                            background: #ff6b6b; color: white; border: none; 
                            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
                            margin-top: 10px;
                        ">⬇️ Download File</button>
                    `;
                    errorMsg.style.display = 'block';
                    return;
                }

                const textarea = document.getElementById('textViewer');
                textarea.value = text;
                textarea.style.display = 'block';
            }).catch(error => {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.innerHTML = `
                    <p>❌ Could not read file as text.</p>
                    <p>Try downloading it instead:</p>
                    <button onclick="downloadCurrentFile()" style="
                        background: #ff6b6b; color: white; border: none; 
                        padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
                        margin-top: 10px;
                    ">⬇️ Download File</button>
                `;
                errorMsg.style.display = 'block';
            });
        }

        function downloadCurrentFile() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileId = urlParams.get('id');
            const filename = decodeURIComponent(urlParams.get('filename') || 'file');

            const a = document.createElement('a');
            a.href = `${API_URL}/files/${fileId}/download`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function displayPDF(blob) {
            const url = URL.createObjectURL(blob);
            const pdfViewer = document.getElementById('pdfViewer');

            // Use PDF.js to render the PDF
            pdfjsLib.getDocument(url).promise.then(pdf => {
                let pageNum = 1;
                const renderPage = (num) => {
                    pdf.getPage(num).then(page => {
                        const scale = 1.5;
                        const viewport = page.getViewport({ scale: scale });

                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise.then(() => {
                            pdfViewer.appendChild(canvas);

                            if (num < pdf.numPages) {
                                renderPage(num + 1);
                            }
                        });
                    });
                };

                renderPage(pageNum);
                pdfViewer.style.display = 'block';
            }).catch(error => {
                showError('Failed to load PDF: ' + error.message);
            });
        }

        function displayDocx(blob) {
            // For DOCX files, offer download or basic view
            const url = URL.createObjectURL(blob);
            const iframe = document.getElementById('docxViewer');
            iframe.src = `https://docs.google.com/gviz/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            iframe.style.display = 'block';
        }

        function displayExcel(blob) {
            // For XLSX files, offer download or basic view
            const url = URL.createObjectURL(blob);
            const iframe = document.getElementById('xlsxViewer');
            iframe.src = `https://docs.google.com/gviz/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            iframe.style.display = 'block';
        }

        function displayPowerPoint(blob) {
            // For PPTX files, offer download or basic view
            const url = URL.createObjectURL(blob);
            const iframe = document.getElementById('pptxViewer');
            iframe.src = `https://docs.google.com/gviz/viewer?url=${encodeURIComponent(url)}&embedded=true`;
            iframe.style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loadingMsg').style.display = 'none';
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = `❌ ${message}`;
            errorMsg.style.display = 'block';
        }
    </script>
</body>

</html>
